<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel KV 连通性测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 max-w-md w-full">
        <h1 class="text-xl font-bold mb-4 text-indigo-600 flex items-center gap-2">
            <span class="inline-block w-3 h-3 rounded-full bg-indigo-600 animate-pulse"></span>
            数据库连通性联调面板
        </h1>
        
        <div class="mb-6 p-4 bg-slate-100 rounded-xl">
            <h2 class="text-sm font-bold mb-2">1. 写入测试 (写入一条临时数据)</h2>
            <button id="btnSet" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors">
                向数据库存入 {"test_status": "OK"}
            </button>
        </div>

        <div class="mb-4 p-4 bg-slate-100 rounded-xl">
            <h2 class="text-sm font-bold mb-2">2. 读取测试 (获取最新数据)</h2>
            <button id="btnGet" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors">
                从数据库读取数据
            </button>
        </div>

        <div class="mt-4">
            <h2 class="text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">执行日志反馈</h2>
            <pre id="logOutput" class="bg-slate-900 text-emerald-400 p-3 rounded-lg text-xs font-mono min-h-[120px] overflow-auto whitespace-pre-wrap">等待操作...</pre>
        </div>
    </div>

<script>
        // 现在的请求路径直接指向 Vercel 的 Serverless 后端接口
        const API_URL = '/api/watchlist';
        
        // 对应你在后端写好的访问暗号
        const HEADERS = {
            'Content-Type': 'application/json',
            'X-Watchlist-Auth': 'my_private_secret_key_999'
        };

        const logEl = document.getElementById('logOutput');
        function printLog(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            if (isError) {
                logEl.innerHTML += `\n[${time}] ❌ ${msg}`;
            } else {
                logEl.innerHTML += `\n[${time}] ➔ ${msg}`;
            }
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 测试写入 (POST)
        document.getElementById('btnSet').addEventListener('click', async () => {
            printLog('正在通过后端接口写入测试数据...');
            
            // 模拟原网页的结构，带上配置和女优列表
            const mockWatchlistData = {
                config: { sitelist: ["xasiat", "google"] },
                actresses: [{ name: "测试女优A", expanded: true, works: [] }]
            };
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify(mockWatchlistData) // 直接把对象当成 Body 发给后端
                });

                if (!res.ok) throw new Error(`HTTP状态码异常: ${res.status}`);
                const result = await res.json();
                
                printLog(`写入成功！接口返回: ${JSON.stringify(result)}`);
            } catch (err) {
                printLog(`写入失败，原因: ${err.message}`, true);
            }
        });

        // 测试读取 (GET)
        document.getElementById('btnGet').addEventListener('click', async () => {
            printLog('正在通过后端接口读取测试数据...');
            
            try {
                const res = await fetch(API_URL, {
                    method: 'GET',
                    headers: HEADERS
                });

                if (!res.ok) throw new Error(`HTTP状态码异常: ${res.status}`);
                const result = await res.json();
                
                printLog(`读取成功！拿到的完整内容为:\n${JSON.stringify(result, null, 2)}`);
            } catch (err) {
                printLog(`读取失败，原因: ${err.message}`, true);
            }
        });
    </script>
</body>
</html>
