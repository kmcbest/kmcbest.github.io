    <style>
        /* Theme variables mapping */
        :root {
            --font-sans: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body.theme-default {
            --bg-primary: #f8fafc;
            --bg-surface: #ffffff;
            --bg-card-header: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --color-primary: #4f46e5;
            --color-primary-hover: #4338ca;
            --color-primary-light: #e0e7ff;
            --color-primary-light-text: #3730a3;
            --color-success: #059669;
            --color-success-hover: #047857;
            --color-success-light: #d1fae5;
            --color-success-light-text: #065f46;
            --color-danger: #e11d48;
            --color-danger-hover: #be123c;
            --color-danger-light: #ffe4e6;

        body.theme-skin1 {

            --bg-card-header: rgba(30, 41, 59, 0.7);

            --glass-blur: blur(16px);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body.theme-skin2 {
            --bg-primary: #fffbf9;
            --bg-surface: #ffffff;
            --bg-card-header: #fff5f5;
            --text-primary: #4a2c2c;

            --color-primary-hover: #be185d;
            --color-primary-light: #fce7f3;
            --color-primary-light-text: #9d174d;

            --color-success-hover: #0f766e;
            --color-success-light: #ccfbf1;

            --color-danger: #e11d48;

            --color-danger-light: #ffe4e6;
            --color-danger-light-text: #9f1239;
            --color-border: #f3e8e8;
            --shadow-color: rgba(219, 39, 119, 0.06);
            --shadow-sm: 0 1px 3px 0 var(--shadow-color), 0 1px 2px -1px var(--shadow-color);
            --shadow-md: 0 4px 15px -3px var(--shadow-color);

            --glass-blur: none;

            --glass-border: #f3e8e8;
        }

        /* Prevent scroll chaining for independent sidebar scrolling */
        .sidebar-scroll {
            overscroll-behavior: contain;
        }

        /* Customize scrollbars for a premium look */

            width: 6px;

            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-primary);
            opacity: 0.7;
        }
    </style>

    <script>
        // ========================
        // Vercel Serverless Function Proxy Settings
        // ========================
        const API_URL = '/api/watchlist';
        const HEADERS = {
            'Content-Type': 'application/json',
            'X-Watchlist-Auth': 'my_private_secret_key_999'
        };

        // Global Data Cache
        let data = {
            config: {
                sitelist: []
            },
            actresses: []
        };

        let sortMode = false;
        let stagingActresses = null; 
        let navSortMode = 'default'; // 'default' or 'alphabetical'

        // ========================
        // Toast Manager
        // ========================
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            
            // Icon customization
            const iconSvg = isError 
                ? `<svg class="w-5 h-5 text-rose-500 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`
                : `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
            
            toast.innerHTML = `${iconSvg}<span>${message}</span>`;
            
            // Set base styles
            toast.className = 'toast fixed top-6 right-6 z-[2000] px-5 py-3.5 rounded-2xl shadow-brand-lg border backdrop-blur-md transition-all duration-300 flex items-center gap-2.5 font-bold text-sm';
            
            if (isError) {
                toast.classList.add('bg-rose-500/10', 'text-rose-500', 'border-rose-500/20');
            } else {
                toast.classList.add('bg-brand-surface', 'text-brand-text', 'border-brand-border');
            }
            
            // Trigger Animation
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-10px]');
            toast.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
            
            if (window.toastTimeout) clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-10px]');
                toast.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
            }, isError ? 4000 : 2500);
        }

        // ========================
        // Theme Manager
        // ========================
        function setTheme(name) {
            document.body.classList.remove('theme-default', 'theme-skin1', 'theme-skin2');
            document.body.classList.add(`theme-${name}`);
            
            document.querySelectorAll('.theme-tab').forEach(tab => {
                tab.className = 'theme-tab px-3.5 py-1.5 rounded-xl text-xs font-semibold transition-all duration-200 text-brand-textMuted hover:text-brand-text hover:bg-brand-border/20';
            });
            
            const activeTab = document.getElementById(`btn-theme-${name}`);
            if (activeTab) {
                activeTab.className = 'theme-tab px-3.5 py-1.5 rounded-xl text-xs font-bold transition-all duration-200 bg-brand-primary text-white shadow-md shadow-brand-primary/20';
            }
            
            localStorage.setItem('watchlist-theme', name);
            
            // Sync Word Cloud Colors to new palette
            renderWordCloud();
        }

        // ========================
        // Network Logic & Hybrid Cache
        // ========================
        async function fetchData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'GET',
                    headers: HEADERS
                });
                if (!res.ok) throw new Error(`加载失败: ${res.status}`);
                const json = await res.json();
                
                // 如果云端拉回了有效数据，立即在本地刷新保底快照
                if (json) {
                    localStorage.setItem('watchlist-data-backup', JSON.stringify(json));
                    return json;
                }
                return { config: { sitelist: [] }, actresses: [] };
            } catch (err) {
                console.error('Fetch failed, trying local storage...', err);
                // 极端环境、或者数据库初次联调异常时，捞起本地历史最后的缓存影子
                const localBackup = localStorage.getItem('watchlist-data-backup');
                if (localBackup) {
                    showToast('云端连接失败，已自动载入本地历史缓存数据。', false);
                    return JSON.parse(localBackup);
                }
                throw err;
            }
        }

        async function updateData(payload) {
            // 保存时在本地最快响应链上存一份快照，防止极端断网数据丢失
            localStorage.setItem('watchlist-data-backup', JSON.stringify(payload));

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: HEADERS,
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`保存失败: ${res.status}`);
            return res.json();
        }

        async function saveToCloud() {
            try {
                await updateData(data);
                showToast('所有改动已成功保存到云端！');
            } catch (err) {
                showToast(err.message || '云端保存失败', true);
            }
        }

        // ========================
        // Parsing Helpers
        // ========================
        function parseWorks(text) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            return lines.map(line => {
                const matchDone = line.match(/^\s*-\s*\[x\]\s*(.+)$/i);
                const matchNotDone = line.match(/^\s*-\s*\[\s\]\s*(.+)$/);

                if (matchDone) {
                    return { title: matchDone[1].trim(), done: true };
                } else if (matchNotDone) {
                    return { title: matchNotDone[1].trim(), done: false };
                } else {
                    return { title: line.trim(), done: false };
                }
            });
        }

        // Generate markdown output
        function generateWorksText(works) {
            return works.map(w => w.done ? `- [x] ${w.title}` : `- [ ] ${w.title}`).join('\n');
        }

        // ========================

            popup.style.left = `${rect.left + window.scrollX}px`;
            popup.style.top = `${rect.bottom + window.scrollY + 8}px`;

            const siteList = (data.config && data.config.sitelist) ? data.config.sitelist : [];
            
            if (!siteList.length) {

                empty.className = 'px-4 py-3 text-xs text-brand-textMuted italic';
                empty.textContent = '暂无可用配置站点。';

                siteList.forEach(site => {
                    const a = document.createElement('a');

                    a.target = "_blank";

            function close(event) {
                if (!popup.contains(event.target) && !event.target.classList.contains('title') && !event.target.closest('.title')) {
                    popup.classList.add('hidden');
                    document.removeEventListener('click', close);
                }
            }
            setTimeout(() => document.addEventListener('click', close), 100);

        // ========================
        // Sorting Controls
        // ========================
        function moveActress(i, action) {
            if (!stagingActresses) return;
            const arr = stagingActresses;
            if (action === 'top' && i > 0) {
                arr.unshift(arr.splice(i, 1)[0]);
            } else if (action === 'up' && i > 0) {
                [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]];
            } else if (action === 'down' && i < arr.length - 1) {
                [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]];
            } else if (action === 'bottom' && i < arr.length - 1) {
                arr.push(arr.splice(i, 1)[0]);
            }
            renderActressList();
            renderWordCloud();
        }

        // ========================
        // ECharts Word Cloud Rendering
        // ========================
        function renderWordCloud() {
            const chartDom = document.getElementById('wordCloud');
            if (!chartDom) return;

            let chart = echarts.getInstanceByDom(chartDom);
            if (chart) {
                chart.dispose();
            }

            chart = echarts.init(chartDom, null, { renderer: 'svg' });

            const list = sortMode ? (stagingActresses || []) : (data.actresses || []);
            if (!list.length) {
                chart.clear();
                chartDom.innerHTML = `<div class="text-brand-textMuted text-center mt-20 italic">暂无词云展示数据</div>`;
                document.getElementById('wordCloudStats').textContent = '女优总数：0，作品总数：0';
                return;
            }

            const actressCount = list.length;
            const workCount = list.reduce((sum, actress) => sum + (actress.works ? actress.works.length : 0), 0);
            document.getElementById('wordCloudStats').textContent = `女优总数：${actressCount}，作品总数：${workCount}`;

            const wordData = list.map(a => ({
                name: a.name,
                value: Math.max(10, (a.works ? a.works.length : 0) * 5)
            }));

            // Fetch Theme for customization
            const activeTheme = Array.from(document.body.classList).find(cls => cls.startsWith('theme-'))?.replace('theme-', '') || 'default';
            let wordColor;
            let shadowColor;
            let tooltipBg;
            let tooltipText;

            if (activeTheme === 'skin1') {
                const neonColors = ['#a78bfa', '#f472b6', '#38bdf8', '#34d399', '#facc15', '#fb923c'];
                wordColor = () => neonColors[Math.floor(Math.random() * neonColors.length)];
                shadowColor = '#8b5cf6';
                tooltipBg = '#1e293b';
                tooltipText = '#f8fafc';
            } else if (activeTheme === 'skin2') {
                const sakuraColors = ['#db2777', '#ec4899', '#be185d', '#9d174d', '#0d9488', '#8c7373'];
                wordColor = () => sakuraColors[Math.floor(Math.random() * sakuraColors.length)];
                shadowColor = '#db2777';
                tooltipBg = '#fff5f5';
                tooltipText = '#4a2c2c';
            } else {
                const defaultColors = ['#312e81', '#1e3a8a', '#064e3b', '#4f46e5', '#4338ca', '#581c87'];
                wordColor = () => defaultColors[Math.floor(Math.random() * defaultColors.length)];
                shadowColor = '#4f46e5';
                tooltipBg = '#ffffff';
                tooltipText = '#0f172a';
            }

            const option = {
                tooltip: {
                    show: true,
                    backgroundColor: tooltipBg,
                    borderColor: 'rgba(0, 0, 0, 0.05)',
                    borderWidth: 1,
                    textStyle: {
                        color: tooltipText,
                        fontSize: 12,
                        fontWeight: 'bold'
                    },
                    formatter: p => `${p.name}：${(p.value / 5).toFixed(0)} 个作品`
                },
                series: [{
                    type: 'wordCloud',
                    shape: 'circle',
                    keepAspect: true,
                    gridSize: 8,
                    sizeRange: [14, 38],
                    rotationRange: [-45, 45],
                    rotationStep: 45,
                    textStyle: {
                        color: wordColor,
                        fontWeight: 'bold'
                    },
                    shrinkToFit: true,
                    emphasis: {
                        textStyle: {
                            shadowBlur: 15,
                            shadowColor: shadowColor
                        }
                    },
                    data: wordData
                }]
            };

            chart.setOption(option);

            chart.off('click');
            chart.on('click', (params) => {
                const name = params.name;
                const id = `actress-${encodeURIComponent(name)}`;
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    element.classList.add('ring-2', 'ring-brand-primary');
                    setTimeout(() => element.classList.remove('ring-2', 'ring-brand-primary'), 2000);
                }
            });

            if (!window.chartResizeRegistered) {
                window.addEventListener('resize', () => {
                    const activeChart = echarts.getInstanceByDom(document.getElementById('wordCloud'));
                    if (activeChart) activeChart.resize();
                });
                window.chartResizeRegistered = true;
            }
        }

        // ========================
        // Event Binding Initialization
        // ========================
        function setupEventListeners() {
            document.querySelectorAll('.btn-add-actress').forEach(btn => {
                btn.addEventListener('click', () => {
                    const name = prompt('请输入女优姓名：');
                    if (!name) return;
                    data.actresses.push({
                        name,
                        expanded: true,
                        works: []
                    });
                    renderActressList();
                    renderWordCloud();
                    showToast('新女优已添加，请记得保存。');
                });
            });

            document.querySelectorAll('.btn-save-all').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (sortMode) {
                        showToast('请先完成排序或取消排序操作。', true);
                        return;
                    }
                    await saveToCloud();
                });
            });

            document.querySelectorAll('.btn-toggle-sort').forEach(btn => {
                btn.addEventListener('click', () => {
                    sortMode = !sortMode;
                    if (sortMode) {
                        stagingActresses = JSON.parse(JSON.stringify(data.actresses || []));
                        showToast('进入排序模式（改动尚未保存）');
                    } else {
                        stagingActresses = null;
                    }
                    updateSortButtonsUI();
                    renderActressList();
                    renderWordCloud();
                });
            });

            document.querySelectorAll('.btn-cancel-sort').forEach(btn => {
                btn.addEventListener('click', () => {
                    sortMode = false;
                    stagingActresses = null;
                    updateSortButtonsUI();
                    renderActressList();
                    renderWordCloud();
                    showToast('已取消排序操作');
                });
            });

            document.querySelectorAll('.btn-save-sort').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!stagingActresses) return;
                    data.actresses = JSON.parse(JSON.stringify(stagingActresses));
                    sortMode = false;
                    stagingActresses = null;
                    updateSortButtonsUI();
                    renderActressList();
                    renderWordCloud();
                    showToast('排序已暂存本地，请记得保存改动。');
                });
            });

            document.getElementById('saveSiteList').addEventListener('click', () => {
                const text = document.getElementById('siteListInput').value;
                data.config.sitelist = text.split('\n').map(s => s.trim()).filter(s => s !== '');
                showToast('站点列表已更新到本地，请记得保存。');
            });

            document.getElementById('resetSiteList').addEventListener('click', () => {
                renderSiteList();
                showToast('站点配置已重置为当前数据。');
            });

            document.getElementById('btn-sort-nav').addEventListener('click', toggleNavSort);
        }

        // ========================
        // Application Startup
        // ========================
        async function init() {
            // Theme initialization
            const savedTheme = localStorage.getItem('watchlist-theme') || 'default';
            setTheme(savedTheme);

            const container = document.getElementById('actressList');
            container.innerHTML = `<div class="bg-brand-surface border border-brand-border p-8 rounded-2xl text-brand-textMuted italic flex items-center justify-center gap-2 shadow-brand-md">
                <svg class="animate-spin h-5 w-5 text-brand-primary" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span>数据加载中...</span>
            </div>`;

            try {
                const fetched = await fetchData();
                if (fetched) data = fetched;
            } catch (err) {
                container.innerHTML = `<div class="bg-rose-500/10 border border-rose-500/20 p-6 rounded-2xl text-rose-500 flex flex-col gap-2 shadow-brand-md">
                    <div class="font-bold flex items-center gap-1.5"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>加载失败</div>
                    <div class="text-sm">错误原因：${err.message}。请检查网络配置或重新刷新。</div>
                </div>`;
                showToast('云端数据加载失败，已切换或降级检查。', true);
                console.error(err);
            }

            if (!data.config) data.config = { sitelist: [] };
            if (!data.actresses) data.actresses = [];

            renderSiteList();
            renderActressList();
            renderWordCloud();
            setupEventListeners();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
